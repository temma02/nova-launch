name: Frontend Lifecycle E2E

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"

jobs:
  campaign-lifecycle-e2e:
    name: Campaign Lifecycle E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      TZ: UTC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run deterministic lifecycle E2E suite
        run: npm run test:e2e:lifecycle
