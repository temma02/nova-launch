name: Production Readiness Gate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      network:
        description: 'Stellar network to verify against'
        required: false
        default: 'testnet'
        type: choice
        options: [testnet, mainnet]

jobs:
  readiness-gate:
    name: Production Readiness Gate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network || 'testnet' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run production readiness gate
        env:
          FACTORY_CONTRACT_ID: ${{ secrets.FACTORY_CONTRACT_ID }}
          STELLAR_NETWORK: ${{ github.event.inputs.network || 'testnet' }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'http://localhost:3001' }}
        run: |
          chmod +x scripts/run-production-readiness-gate.sh
          ./scripts/run-production-readiness-gate.sh \
            --network "$STELLAR_NETWORK" \
            --backend-url "$BACKEND_URL"

      - name: Gate result summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Production Readiness Gate PASSED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Production Readiness Gate FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "See job logs for failing checks and remediation steps." >> "$GITHUB_STEP_SUMMARY"
            echo "Refer to [docs/PRODUCTION_READINESS_GATE.md](docs/PRODUCTION_READINESS_GATE.md)." >> "$GITHUB_STEP_SUMMARY"
          fi
