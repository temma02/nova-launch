name: Campaign Consistency Check

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  consistency-check:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Consistency Checker Tests
        run: npm test -- campaignConsistencyChecker.test.ts --run

      - name: Run Fixture Scenario Tests
        run: npm test -- campaignConsistencyFixtures.test.ts --run

      - name: Run Randomized Trace Tests
        run: npm test -- campaignConsistencyRandomized.test.ts --run

      - name: Verify No Drift
        run: |
          echo "✅ All consistency checks passed"
          echo "✅ No drift detected between backend and on-chain state"
